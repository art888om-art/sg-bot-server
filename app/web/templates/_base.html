<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>{% block title %}AutoCRM{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  {% block nav %}
  <nav class="navbar" aria-label="Главная навигация">
    <div class="nav-inner">
      <a class="brand" href="/dashboard">⚡ AutoCRM</a>
      <div class="nav-links">
        <a href="/dashboard">Дашборд</a>
        <a href="/clients">Клиенты</a>
        <a href="/products">Товары</a>
        <a href="/deals">Сделки</a>
        <a href="/tasks">Задачи</a>
      </div>
      <div class="nav-right">
        {% if manager %}<span class="nav-user">{{ manager.name }}</span>{% endif %}
        <button type="button" class="btn-logout" onclick="logout()">Выйти</button>
      </div>
    </div>
  </nav>
  {% endblock %}
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <div id="toast-host" aria-live="polite"></div>
  <script src="/static/js/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
